name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Optional: cancel in-progress runs when a new push happens (reduces "canceled" annotations)
# concurrency:
#   group: "pages"
#   cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Generate diagrams manifest
        run: node frontend/scripts/generate-manifest.cjs

      - name: Build
        run: cd frontend && npm run build
        env:
          VITE_BUILD_ID: ${{ github.sha }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Verify manifest in build output
        run: |
          echo "Diagram count in manifest:"
          grep -o '"id":' frontend/dist/diagrams-manifest.json | wc -l
          head -c 400 frontend/dist/diagrams-manifest.json
          echo ""

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
